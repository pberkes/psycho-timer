<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psycho-Timer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- MAIN SCREEN: patient list -->
  <div id="screen-main" class="screen active">
    <header>
      <h1>Psycho-Timer</h1>
      <div class="header-actions">
        <button id="btn-summary" class="btn btn-secondary">Summary</button>
      </div>
    </header>

    <main>
      <div id="patient-list"></div>
      <button id="btn-add-patient" class="btn btn-primary btn-full">+ Add Patient</button>
    </main>
  </div>

  <!-- HISTORY SCREEN: sessions for one patient -->
  <div id="screen-history" class="screen">
    <header>
      <button id="btn-back-main" class="btn btn-ghost">← Back</button>
      <h2 id="history-patient-name"></h2>
      <div></div>
    </header>

    <main>
      <div id="session-list"></div>
    </main>
  </div>

  <!-- SUMMARY SCREEN: monthly totals -->
  <div id="screen-summary" class="screen">
    <header>
      <button id="btn-back-summary" class="btn btn-ghost">← Back</button>
      <h2>Monthly Summary</h2>
      <div></div>
    </header>

    <main>
      <div class="month-nav">
        <button id="btn-prev-month" class="btn btn-ghost">‹</button>
        <span id="summary-month-label"></span>
        <button id="btn-next-month" class="btn btn-ghost">›</button>
      </div>
      <div id="summary-list"></div>
      <button id="btn-export-summary" class="btn btn-secondary btn-full">Export month as CSV</button>
      <button id="btn-export-all" class="btn btn-secondary btn-full">Export all sessions as CSV</button>
    </main>
  </div>

  <!-- MODAL: add/edit patient -->
  <div id="modal-patient" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modal-patient-title">Add Patient</h3>
      <input id="input-patient-name" type="text" placeholder="Patient nickname or ID" />
      <div class="modal-actions">
        <button id="btn-cancel-patient" class="btn btn-ghost">Cancel</button>
        <button id="btn-save-patient" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- MODAL: edit session -->
  <div id="modal-session" class="modal-overlay hidden">
    <div class="modal">
      <h3>Edit Session</h3>
      <label>Start
        <input id="input-session-start" type="datetime-local" />
      </label>
      <label>End
        <input id="input-session-end" type="datetime-local" />
      </label>
      <label>Notes
        <input id="input-session-notes" type="text" placeholder="Optional notes" />
      </label>
      <div class="modal-actions">
        <button id="btn-cancel-session" class="btn btn-ghost">Cancel</button>
        <button id="btn-delete-session" class="btn btn-danger">Delete</button>
        <button id="btn-save-session" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Firebase (loaded as module in app.js) -->
  <script src="js/app.js"></script>
</body>
</html>
